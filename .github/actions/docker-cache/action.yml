name: 'Docker Layer Caching'
description: 'Sets up Docker Buildx and caches Docker layers'
inputs:
  dist:
    description: 'Distribution name'
    required: true
  python:
    description: 'Python version'
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0
      with:
        driver-opts: network=host
    
    - name: Cache Docker layers
      id: cache-docker-layers
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-autotest-${{ inputs.dist }}-${{ inputs.python }}-${{ hashFiles('etc/docker/test/*.Dockerfile', '**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-buildx-autotest-${{ inputs.dist }}-${{ inputs.python }}-
          ${{ runner.os }}-buildx-autotest-${{ inputs.dist }}-
          ${{ runner.os }}-buildx-autotest-
    
    - name: Set cache configuration
      id: cache-config
      shell: bash
      run: |
        echo "DOCKER_BUILDKIT=1" >> $GITHUB_ENV
        echo "BUILDX_CACHE_FROM=type=local,src=/tmp/.buildx-cache" >> $GITHUB_ENV
        echo "BUILDX_CACHE_TO=type=local,dest=/tmp/.buildx-cache-new,mode=max" >> $GITHUB_ENV
